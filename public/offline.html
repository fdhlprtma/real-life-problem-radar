<!doctype html>
<html lang="id">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#121212">
  <title>RLP Radar - Offline</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f1e8;
      --panel: #fffdf8;
      --ink: #121212;
      --soft: #5b5b5b;
      --line: #d8d0c2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "IBM Plex Sans", sans-serif;
      background: radial-gradient(circle at top, #ffffff 0%, var(--bg) 62%);
      color: var(--ink);
    }

    main {
      width: min(560px, 100%);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 28px;
      background: var(--panel);
      box-shadow: 0 20px 40px rgba(18, 18, 18, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      line-height: 1.1;
    }

    p {
      margin: 0;
      line-height: 1.7;
      color: var(--soft);
    }

    a {
      display: inline-flex;
      margin-top: 20px;
      padding: 11px 16px;
      border-radius: 10px;
      background: #121212;
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <main>
    <h1>Anda sedang offline</h1>
    <p>Beberapa halaman RLP Radar masih bisa dibuka dari cache. Untuk data terbaru, sambungkan kembali perangkat Anda ke
      internet lalu muat ulang halaman.</p>
    <a href="./index.php">Kembali ke Beranda</a>
  </main>
</body>

</html>
